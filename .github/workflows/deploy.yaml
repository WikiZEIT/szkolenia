name: Deploy to MyDevil Server

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: PHP environment info
        run: |
          echo "=== PHP version ==="
          php --version
          echo "=== PHP binary ==="
          which php
          echo "=== PHP ini ==="
          php --ini
          echo "=== display_errors ==="
          php -r "echo 'display_errors: ' . ini_get('display_errors') . PHP_EOL;"
          echo "=== error_reporting ==="
          php -r "echo 'error_reporting: ' . ini_get('error_reporting') . PHP_EOL;"

      - name: Verify PHP check catches errors (sanity check)
        run: |
          echo '<?php syntax error here !!!' > /tmp/test-bad.php
          php -S localhost:9875 /tmp/test-bad.php > /tmp/sanity.log 2>&1 &
          sleep 2
          CODE=$(curl -s -o /tmp/sanity-response.html -w "%{http_code}" http://localhost:9875/)
          kill %1 2>/dev/null || true
          echo "Sanity check HTTP code for known-bad PHP: $CODE"
          cat /tmp/sanity.log
          if [ "$CODE" = "200" ]; then
            echo "::warning::PHP built-in server returns 200 even for broken scripts on this runner — HTTP code check is unreliable"
          else
            echo "HTTP code check works correctly on this runner (got $CODE)"
          fi
          if grep -qiE 'Fatal error:|Parse error:|syntax error' /tmp/sanity-response.html /tmp/sanity.log; then
            echo "Log/response error check works correctly on this runner"
          else
            echo "::warning::PHP errors do not appear in response or log on this runner"
            echo "--- sanity log ---"
            cat /tmp/sanity.log
            echo "--- sanity response ---"
            cat /tmp/sanity-response.html
          fi

      - name: Check PHP
        run: |
          php -l index.php || { echo "::error::PHP syntax error in index.php"; exit 1; }
          php -S localhost:9876 index.php > /tmp/php-server.log 2>&1 &
          PHP_PID=$!
          sleep 2
          HTTP_CODE=$(curl -s -o /tmp/php-response.html -w "%{http_code}" http://localhost:9876/)
          kill $PHP_PID 2>/dev/null || true
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::PHP server returned HTTP $HTTP_CODE"
            cat /tmp/php-server.log
            exit 1
          fi
          if grep -qiE 'Fatal error:|Parse error:' /tmp/php-response.html /tmp/php-server.log; then
            echo "::error::PHP errors found:"
            grep -hiE 'Fatal error:|Parse error:' /tmp/php-response.html /tmp/php-server.log
            exit 1
          fi
          echo "PHP check passed (HTTP $HTTP_CODE)"
          echo "--- server log ---"
          cat /tmp/php-server.log

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/master'

    steps:
      - name: "Deploy to MyDevil Server"
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_SERVER }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd ${{ secrets.SSH_PATH }}
            git pull
